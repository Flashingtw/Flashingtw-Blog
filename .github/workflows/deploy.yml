name: Deploy Astro to GitHub Pages

on:
  # 當代碼被推送到 main 分支時自動觸發 (如果你的主分支叫 master，請改成 master)
  push:
    branches: [main]
  # 允許你從 GitHub 網頁介面手動觸發
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
        
      # 新增：在 Runner 上安裝 Bun 環境
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install, build, and upload your site
        uses: withastro/action@v2
        with:
          # 新增：明確告訴 Astro 使用 bun
          package-manager: bun